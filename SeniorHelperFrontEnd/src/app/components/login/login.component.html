<div class="page sh-page">
  <div class="page-content sh-page-content">
    <main class="login-card sh-form-card sh-form-card--compact" aria-label="Login form">
      <header class="login-header sh-form-header">
        <h1 data-cy="login-title">Senior Helper</h1>
        <p>Sign in to your account</p>
      </header>

      <form class="login-form sh-form" #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
        <label class="field sh-field">
          <span>Username:</span>
          <input
            type="text"
            name="username"
            data-cy="username"
            [(ngModel)]="username"
            autocomplete="username"
            required
          />
        </label>

        <label class="field sh-field">
          <span>Password:</span>
          <input
            type="password"
            name="password"
            data-cy="password"
            [(ngModel)]="password"
            autocomplete="current-password"
            required
          />
        </label>

        <label class="remember">
          <input type="checkbox" name="remember" [(ngModel)]="remember" />
          <span>Remember me</span>
        </label>

        <button class="btn primary sh-btn sh-btn--primary" type="submit" [disabled]="loading" data-cy="submit-login">
          {{ loading ? 'Signing In...' : 'Sign In' }}
        </button>
        <button class="btn secondary sh-btn sh-btn--secondary" type="button" routerLink="/register">Register</button>

        @if (errorMessage) {
          <p class="status error sh-status sh-status--error">{{ errorMessage }}</p>
        }
        @if (successMessage) {
          <p class="status success sh-status sh-status--success">{{ successMessage }}</p>
        }
      </form>
    </main>
  </div>
</div>
