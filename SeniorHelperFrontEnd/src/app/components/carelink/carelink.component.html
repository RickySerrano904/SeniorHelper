<div class="carelink-page sh-page-shell">
  <div class="page-content sh-page-shell-content">
    <button class="back-link" [routerLink]="['/home']">
      <span class="material-icons">arrow_back</span> Back to Home
    </button>

    <section class="connections-card">
      <div class="card-copy">
        <h1>Connections</h1>
        <p>Manage who can help with your schedule.</p>
      </div>
    </section>

    <section class="connection-grid">
      <!-- Create Connection Form -->
      <aside class="create-card">
        <h3>Create Connection</h3>
        <p>Connect with a new user by entering their information.</p>

        <form class="create-form" (ngSubmit)="createConnection()">
          <label>
            User ID
            <input type="number" [(ngModel)]="newCaregiverId" name="caregiverId" placeholder="Enter User ID" required />
          </label>
          <label>
            First Name
            <input type="text" [(ngModel)]="newFirstName" name="firstName" placeholder="Enter First Name" required />
          </label>
          <label>
            Last Name
            <input type="text" [(ngModel)]="newLastName" name="lastName" placeholder="Enter Last Name" required />
          </label>
          <button type="submit" class="submit-btn sh-btn sh-btn--primary">Submit</button>
        </form>
      </aside>

      <!-- View Connections -->
      <aside class="view-card">
        <h3>Your Connections</h3>

        <div *ngIf="connections.length === 0" class="empty-state">
          No connections yet.
        </div>

        <div *ngFor="let conn of connections; let i = index" class="connection-item">
          <div class="connection-main">
            <p class="connection-name">{{ conn.caregiverUsername }}</p>
            <p class="connection-meta">{{ conn.caregiverRole }} · Connected since {{ conn.connectedSince | date }}</p>
          </div>
          <button class="delete-icon-btn" (click)="deleteConnection(conn)">
            <span class="material-icons">delete_outline</span>
          </button>
        </div>
      </aside>
    </section>
  </div>
</div>
