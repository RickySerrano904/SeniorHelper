<div class="carelink-container">

  <a routerLink="/home" class="back-btn">← Back to Dashboard</a>

  <h2>Connections</h2>

  <div class="connections-layout">

    <!-- Left: Create Connection -->
    <div class="create-connection">
      <h3>Connect with a New User</h3>
      <p>Enter the user's information to give them access to help manage your schedule.</p>

      <form (ngSubmit)="createConnection()">
        <label>
          User ID:
          <input type="number" [(ngModel)]="newSeniorId" name="seniorId" required />
        </label>

        <label>
          First Name:
          <input type="text" [(ngModel)]="newFirstName" name="firstName" />
        </label>

        <label>
          Last Name:
          <input type="text" [(ngModel)]="newLastName" name="lastName" />
        </label>

        <button type="submit" class="submit-btn">Submit</button>
      </form>
    </div>

    <!-- Right: View Connections -->
    <div class="view-connections">
      <h3>Your Connections:</h3>

      <!-- Angular 20+ @if block -->
      <ng-container *@if="connections?.length > 0; else noConnections">
        <ng-container *@for="let conn of connections">
          <div class="connection-item">
            <p>{{ conn.seniorName }} ({{ conn.role }})</p>
            <p>Connected since: {{ conn.connectedSince | date }}</p>
            <button class="delete-btn" (click)="deleteConnection(conn.seniorId)">🗑️</button>
          </div>
        </ng-container>
      </ng-container>

      <ng-template #noConnections>
        <p>No connections found.</p>
      </ng-template>
    </div>

  </div>
</div>
