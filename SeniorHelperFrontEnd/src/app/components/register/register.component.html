<div class="page">
  <div class="page-content">
    <main class="register-card" aria-label="Registration form">
      <header class="register-header">
        <h1>Senior Helper</h1>
        <p>Create your account</p>
      </header>

      <form class="register-form" #registerForm="ngForm" (ngSubmit)="onSubmit(registerForm)">
        <label class="field">
          <span>First Name:</span>
          <input
            type="text"
            name="firstName"
            [(ngModel)]="firstName"
            autocomplete="given-name"
            required
          />
        </label>

        <label class="field">
          <span>Last Name:</span>
          <input
            type="text"
            name="lastName"
            [(ngModel)]="lastName"
            autocomplete="family-name"
            required
          />
        </label>

        <label class="field">
          <span>Username:</span>
          <input
            type="text"
            name="username"
            [(ngModel)]="username"
            autocomplete="username"
            required
          />
        </label>

        <label class="field">
          <span>Email:</span>
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            autocomplete="email"
            required
          />
        </label>

        <label class="field">
          <span>Password:</span>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            autocomplete="new-password"
            required
          />
        </label>

        <fieldset class="role-group">
          <legend>I am a...</legend>
          <label class="role-option">
            <input type="radio" name="role" [(ngModel)]="role" value="Senior" required />
            <span>Senior</span>
          </label>
          <label class="role-option">
            <input type="radio" name="role" [(ngModel)]="role" value="Caregiver" required />
            <span>Caregiver</span>
          </label>
        </fieldset>

        <button class="btn primary" type="submit" [disabled]="loading">
          {{ loading ? 'Registering...' : 'Register' }}
        </button>

        @if (errorMessage) {
          <p class="status error">{{ errorMessage }}</p>
        }
        @if (successMessage) {
          <p class="status success">{{ successMessage }}</p>
        }
      </form>
    </main>
  </div>
</div>
