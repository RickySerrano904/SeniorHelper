<div class="page sh-page">
  <div class="page-content sh-page-content">
    <main class="profile-card sh-form-card" aria-label="Profile settings form">
      <header class="profile-header sh-form-header">
        <h1>Profile Settings</h1>
        <p>Update your username, first name, last name, or email.</p>
      </header>

      @if (loading) {
        <p class="status sh-status">Loading your settings...</p>
      } @else {
        <form class="profile-form sh-form" #profileForm="ngForm" (ngSubmit)="onSubmit(profileForm)">
          <label class="field sh-field">
            <span>Username:</span>
            <input
              type="text"
              name="username"
              [(ngModel)]="username"
              autocomplete="username"
              minlength="3"
              maxlength="50"
              required
            />
          </label>

          <label class="field sh-field">
            <span>First Name:</span>
            <input
              type="text"
              name="firstName"
              [(ngModel)]="firstName"
              autocomplete="given-name"
              required
            />
          </label>

          <label class="field sh-field">
            <span>Last Name:</span>
            <input
              type="text"
              name="lastName"
              [(ngModel)]="lastName"
              autocomplete="family-name"
              required
            />
          </label>

          <label class="field sh-field">
            <span>Email:</span>
            <input
              type="email"
              name="email"
              [(ngModel)]="email"
              autocomplete="email"
              required
            />
          </label>

          <button class="btn primary sh-btn sh-btn--primary" type="submit" [disabled]="saving">
            {{ saving ? 'Saving...' : 'Save Changes' }}
          </button>

          @if (errorMessage) {
            <p class="status error sh-status sh-status--error">{{ errorMessage }}</p>
          }
        </form>
      }
    </main>
  </div>
</div>
