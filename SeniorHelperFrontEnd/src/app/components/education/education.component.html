<div class="page">
  <div class="page-content">
    <div class="edu-title-box">Educational Modules</div>
    <div class="modules-cards-container">
      @for (module of (modules$ | async); track module.id) {
        <div class="module-card">
          <h2>{{module.title}}</h2>
          <p>{{module.description}}</p>
        </div>
      }
    </div>
  </div>
</div>
