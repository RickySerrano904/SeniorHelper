<div class="faq-container">
  <div class="faq-page-content">

    <div class="faq-title-box">Frequently Asked Questions</div>

    <div *ngFor="let faq of faqs" class="faq-item">
      <h3>{{ faq.question }}</h3>
      <p [innerHTML]="getFormattedAnswer(faq.answer)"></p>
    </div>

  </div>
</div>
