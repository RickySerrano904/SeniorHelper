name: Build and Run SeniorHelper Application
on:
  push:
    paths:
      - 'SeniorHelper/src/**'
      - 'SeniorHelper/pom.xml'
      - 'SeniorHelper/frontend/**'
      - '.github/workflows/build-and-test.yml'
  pull_request:
    paths:
      - 'SeniorHelper/src/**'
      - 'SeniorHelper/pom.xml'
      - 'SeniorHelper/frontend/**'
      - '.github/workflows/build-and-test.yml'
  workflow_dispatch: # Enables manual trigger
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Maven Tests
        run: mvn -f SeniorHelper/pom.xml test

  build-and-run:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -f SeniorHelper/pom.xml clean package -DskipTests

      - name: Run Spring Boot Application
        run: |
          java -jar SeniorHelper/target/*.jar \
            --spring.datasource.url='jdbc:h2:mem:seniorhelper_ci;DB_CLOSE_DELAY=-1;MODE=PostgreSQL' \
            --spring.datasource.driver-class-name=org.h2.Driver \
            --spring.datasource.username=sa \
            --spring.datasource.password= \
            --spring.jpa.database-platform=org.hibernate.dialect.H2Dialect \
            > springboot.log 2>&1 &
          echo $! > springboot.pid
          for i in {1..30}; do
            if curl --fail --silent --show-error http://localhost:8080/actuator/health; then
              exit 0
            fi
            if ! kill -0 "$(cat springboot.pid)" >/dev/null; then
              cat springboot.log
              exit 1
            fi
            sleep 2
          done
          cat springboot.log
          exit 1
        timeout-minutes: 5

      - name: Shutdown Spring Boot Application
        if: always()
        run: |
          if [ -f springboot.pid ] && kill -0 "$(cat springboot.pid)" 2>/dev/null; then
            kill "$(cat springboot.pid)"
          fi
